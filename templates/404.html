<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops — Snip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.0.2">
</head>
<body class="bg-brand-bg-primary text-brand-text-primary font-sans leading-relaxed min-h-screen flex flex-col transition-colors duration-400">
    <div class="min-h-screen flex items-center justify-center flex-col text-center p-8" id="error-page">
        <div class="relative w-[200px] h-[200px] mb-8">
            <div class="text-[5rem] animate-float">🔗</div>
            <div class="particle-system">
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
                <div class="particle-item"></div>
            </div>
        </div>

        <div class="error-code mb-2 animate-fade-in-up">404</div>
        <h1 class="text-2xl font-semibold text-brand-text-primary mb-3 animate-fade-in-up [animation-delay:0.1s] [animation-fill-mode:both]">Link not found</h1>
        <p class="text-[1.05rem] text-brand-text-secondary max-w-[400px] mb-8 leading-relaxed animate-fade-in-up [animation-delay:0.2s] [animation-fill-mode:both]">
            {{ message | default("The short link you're looking for doesn't exist or may have been removed.") }}
        </p>

        <div class="flex gap-4 animate-fade-in-up [animation-delay:0.3s] [animation-fill-mode:both]">
            <a href="/" class="inline-flex items-center justify-center gap-1.5 py-[0.7rem] px-[1.4rem] font-sans text-[0.9rem] font-semibold rounded-[12px] cursor-pointer transition-all duration-150 whitespace-nowrap bg-gradient-accent text-white shadow-brand-sm hover:-translate-y-px hover:shadow-brand-md hover:brightness-[1.08] active:translate-y-0" id="error-home-btn">Go Home</a>
            <a href="/dashboard" class="inline-flex items-center justify-center gap-1.5 py-[0.7rem] px-[1.4rem] font-sans text-[0.9rem] font-semibold rounded-[12px] cursor-pointer transition-all duration-150 whitespace-nowrap bg-transparent text-brand-text-secondary border border-brand-border-default hover:bg-brand-accent-soft hover:text-brand-text-primary hover:border-brand-accent" id="error-dashboard-btn">Dashboard</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Restore theme on error page
        const savedTheme = localStorage.getItem('snip-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
