<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Snip — A fast, minimal URL shortener. Shorten long URLs instantly with custom aliases and expiration options.">
    <meta name="keywords" content="url shortener, link shortener, short url, custom links">
    <title>{% block title %}Snip — URL Shortener{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.0.2">

    {% block head %}{% endblock %}
</head>
<body class="bg-brand-bg-primary text-brand-text-primary font-sans leading-relaxed min-h-screen flex flex-col transition-colors duration-400">
    <!-- Navigation -->
    <nav class="sticky top-0 z-[100] bg-brand-bg-card backdrop-blur-md border-b border-brand-border-subtle transition-colors duration-400" id="main-nav">
        <div class="max-w-[960px] mx-auto px-6 h-[60px] flex items-center justify-between">
            <a href="{{ url_for('main.index') }}" class="flex items-center gap-2 text-brand-text-primary hover:opacity-80 transition-opacity duration-150" id="nav-logo">
                <span class="text-xl">✂</span>
                <span class="text-2xl font-bold tracking-tight">snip</span>
            </a>

            <div class="flex items-center gap-1">
                <a href="{{ url_for('main.index') }}" class="px-3.5 py-2 rounded-sm text-sm font-medium transition-all duration-150 {% if request.endpoint == 'main.index' %}text-brand-accent bg-brand-accent-soft{% else %}text-brand-text-secondary hover:text-brand-text-primary hover:bg-brand-accent-soft{% endif %}" id="nav-home">
                    Home
                </a>
                <a href="{{ url_for('main.dashboard') }}" class="px-3.5 py-2 rounded-sm text-sm font-medium transition-all duration-150 {% if request.endpoint == 'main.dashboard' %}text-brand-accent bg-brand-accent-soft{% else %}text-brand-text-secondary hover:text-brand-text-primary hover:bg-brand-accent-soft{% endif %}" id="nav-dashboard">
                    Dashboard
                </a>
                <button class="flex items-center justify-center w-[38px] h-[38px] border border-brand-border-subtle rounded-sm bg-transparent cursor-pointer transition-all duration-150 ml-2 relative overflow-hidden hover:bg-brand-accent-soft hover:border-brand-border-default" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon sun absolute text-[1.1rem] transition-all duration-250">☀</span>
                    <span class="theme-icon moon absolute text-[1.1rem] transition-all duration-250">☾</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-full flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-brand-border-subtle p-6 text-center transition-colors duration-400">
        <div class="max-w-[960px] mx-auto">
            <p class="text-xs text-brand-text-tertiary">Built with care. Shorten smarter.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
